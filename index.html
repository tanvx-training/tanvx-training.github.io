<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes Learning Guide</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Highlight.js Theme (Atom One Dark for premium look) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <!-- JetBrains Mono Font for Terminal Vibe -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C10.7437 2 9.51608 2.38555 8.46824 3.10978C7.42041 3.83401 6.59858 4.86536 6.09633 6.07921C5.59408 7.29306 5.43283 8.63842 5.63222 9.95754C5.8316 11.2767 6.48206 12.5152 7.51084 13.5204L12 18L16.4892 13.5204C17.5179 12.5152 18.1684 11.2767 18.3678 9.95754C18.5672 8.63842 18.4059 7.29306 17.9037 6.07921C17.4014 4.86536 16.5796 3.83401 15.5318 3.10978C14.4839 2.38555 13.2563 2 12 2Z" fill="#326CE5"/>
                        <circle cx="12" cy="8" r="2" fill="white"/>
                    </svg>
                </div>
                <h2>K8s Master</h2>
            </div>
            
            <div class="sidebar-search">
                <input type="text" id="search-input" placeholder="Search topics..." />
            </div>

            <!-- New Button for 100-Day Plan Screen -->
            <div class="plan-btn-container">
                <button id="btn-open-100-days" class="btn-open-100-days">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    Bảng Lộ Trình 100 Ngày
                </button>
            </div>

            <!-- 100-Day Study Plan Widget -->
            <div class="study-plan-widget" id="study-plan-widget">
                <h3>100-Day CKAD Plan <button id="btn-start-plan" class="btn-start-plan">Start</button></h3>
                <div id="plan-progress-container" style="display: none;">
                    <div class="study-plan-progress">
                        <div class="study-plan-progress-bar" id="plan-progress-bar"></div>
                    </div>
                    <div class="study-plan-info" id="plan-info">Day 1 / 100</div>
                </div>
            </div>

            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- Nav items generated via JS -->
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="mobile-menu-btn" id="mobile-menu-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </div>
                <div class="breadcrumbs" id="breadcrumbs">
                    <span class="breadcrumb-item">Welcome</span>
                </div>
                <div class="header-actions">
                    <!-- Exam Timer -->
                    <div class="exam-timer" id="exam-timer" title="Start Mock Exam Timer">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                        <span id="timer-display">120:00</span>
                    </div>

                    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
                        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </button>
                </div>
            </header>
            
            <div class="scroll-container">
                <!-- 100 Days Plan View Container -->
                <div class="plan-view-area" id="plan-view-area" style="display: none;">
                    <div class="plan-header">
                        <h1>Lộ Trình Ôn Tập 100 Ngày (CKAD)</h1>
                        <p>Tiến độ của bạn sẽ được lưu tự động. Mỗi ngày hãy hoàn thành ít nhất 1 thẻ nhé!</p>
                    </div>
                    <div class="plan-grid" id="plan-grid">
                        <!-- Day Cards generated by JS -->
                    </div>
                </div>

                <div class="content-area" id="content-area">
                    <div class="loading-spinner" id="loading" style="display: none;">
                        <div class="spinner"></div>
                    </div>
                    <div class="markdown-body" id="markdown-body">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
